name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run test suite
        run: pytest
